[pytest]
pythonpath = .
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short

[tool:pytest]
markers =
    unit: Testes unitários
    integration: Testes de integração
    aws: Testes que requerem AWS